<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GNS Estaciones</title>
<style>
:root{
  --tinta:#0e2a2b;--tinta-2:#123c3d;--hueso:#f2efe6;--hueso-2:#e7e2d4;
  --cobre:#c26b3d;--cobre-cl:#e08a56;--cal:#4a8f7b;--alerta:#c0492f;
  --oro:#d9a441;--gris:#7d8b85;--linea:rgba(14,42,43,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--hueso);color:var(--tinta);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:40px}
.wrap{max-width:640px;margin:0 auto}
header{background:var(--tinta);color:var(--hueso);
  padding:calc(env(safe-area-inset-top) + 16px) 20px 18px;position:sticky;top:0;z-index:50;
  border-bottom:3px solid var(--cobre)}
.brand{display:flex;align-items:baseline;gap:8px}
.brand b{font-weight:800;letter-spacing:.5px;font-size:19px}
.brand span{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cobre-cl);font-weight:700}
.sub{font-size:12px;color:rgba(242,239,230,.6);margin-top:3px;letter-spacing:.3px}

.view{display:none;padding:16px}.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--gris);
  font-weight:800;margin:6px 2px 12px;display:flex;align-items:center;gap:8px}
h2.sec::after{content:"";flex:1;height:1px;background:var(--linea)}

/* lista de estaciones */
.est-card{background:#fff;border:1px solid var(--linea);border-radius:14px;padding:14px;
  margin-bottom:11px;display:flex;align-items:center;gap:13px;cursor:pointer;
  box-shadow:0 1px 0 rgba(14,42,43,.04);transition:transform .12s}
.est-card:active{transform:scale(.99)}
.est-ic{width:46px;height:46px;border-radius:13px;flex:none;background:var(--hueso-2);
  display:flex;align-items:center;justify-content:center;font-size:23px}
.est-main{flex:1;min-width:0}
.est-main .nm{font-weight:700;font-size:15.5px}
.est-tags{display:flex;gap:6px;margin-top:5px}
.tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;
  padding:3px 7px;border-radius:6px;display:flex;align-items:center;gap:3px}
.tag-ok{background:rgba(74,143,123,.16);color:var(--cal)}
.tag-no{background:var(--hueso-2);color:var(--gris)}
.chev{color:var(--gris);font-size:20px;flex:none}

.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:transparent;border:2px dashed var(--cobre);color:var(--cobre);border-radius:14px;
  padding:16px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.add-btn:active{background:rgba(194,107,61,.06)}

/* detalle / editor */
.back{background:none;border:0;color:var(--cobre);font-weight:800;font-size:13px;
  cursor:pointer;padding:4px 0;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;color:var(--gris);margin-bottom:7px}
.inp{width:100%;border:1.5px solid var(--linea);border-radius:11px;padding:13px;
  font-size:15px;font-family:inherit;background:#fff;color:var(--tinta)}
.inp:focus{outline:none;border-color:var(--cobre)}
textarea.inp{min-height:120px;resize:vertical;line-height:1.55}
.ic-picker{display:flex;flex-wrap:wrap;gap:7px}
.ic-opt{width:42px;height:42px;border-radius:11px;border:1.5px solid var(--linea);
  background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ic-opt.sel{border-color:var(--cobre);background:rgba(194,107,61,.1)}

/* video */
.video-zone{border:1.5px solid var(--linea);border-radius:13px;overflow:hidden;background:#000}
.video-zone video{width:100%;display:block;max-height:340px;background:#000}
.video-empty{border:2px dashed var(--linea);border-radius:13px;padding:28px 16px;text-align:center;background:#fff}
.video-empty .big{font-size:40px}
.video-empty .t{font-size:14px;font-weight:700;margin-top:6px}
.video-empty .d{font-size:12px;color:var(--gris);margin-top:3px}
.vid-actions{display:flex;gap:8px;margin-top:9px}

/* pasos */
.paso{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--linea)}
.paso:last-child{border-bottom:0}
.paso-n{width:26px;height:26px;border-radius:8px;flex:none;background:var(--cobre);color:#fff;
  font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.paso-t{flex:1;font-size:14px;line-height:1.5;padding-top:2px}

.btn{display:block;width:100%;background:var(--cobre);color:#fff;border:0;border-radius:12px;
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px}
.btn:active{background:var(--cobre-cl)}
.btn-sec{background:var(--tinta)}
.btn-ghost{background:transparent;color:var(--cobre);border:1.5px solid var(--cobre)}
.btn-danger{background:transparent;color:var(--alerta);border:1.5px solid var(--alerta)}
.btn-sm{padding:11px;font-size:13px;flex:1}
.row-btn{display:flex;gap:8px;margin-top:8px}

input[type=file]{display:none}
.hint{font-size:11px;color:var(--gris);margin-top:8px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
  background:var(--tinta);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;
  font-size:14px;opacity:0;transition:.3s;z-index:200;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modo lectura del muchacho */
.read-banner{background:linear-gradient(135deg,var(--tinta),var(--tinta-2));color:var(--hueso);
  border-radius:14px;padding:13px 16px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:center}
.read-banner .em{font-size:22px}
.seg{display:flex;background:var(--hueso-2);border-radius:11px;padding:3px;margin-bottom:16px}
.seg button{flex:1;border:0;background:none;padding:9px;font-size:12.5px;font-weight:800;
  border-radius:9px;cursor:pointer;color:var(--gris);letter-spacing:.3px}
.seg button.on{background:#fff;color:var(--tinta);box-shadow:0 1px 3px rgba(0,0,0,.08)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand"><b>GNS</b><span>Estaciones</span></div>
  <div class="sub">Capacitaci√≥n por estaci√≥n ¬Ј video + paso a paso</div>
</header>

<!-- LISTA -->
<section id="v-lista" class="view active">
  <div class="seg">
    <button id="tab-edit" class="on" onclick="setModo('edit')">Editar</button>
    <button id="tab-ver" onclick="setModo('ver')">Ver como operador</button>
  </div>
  <h2 class="sec">Estaciones de trabajo</h2>
  <div id="lista"></div>
  <button class="add-btn" id="addBtn" onclick="nuevaEstacion()">пЉЛ Agregar estaci√≥n</button>
</section>

<!-- DETALLE/EDITOR -->
<section id="v-detalle" class="view">
  <button class="back" onclick="show('lista')">вАє Volver a estaciones</button>
  <div id="detalle-body"></div>
</section>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="video/*">

<script>
/* ====== CONEXI√УN AL MOTOR DE VIDEOS (Cloudflare + Backblaze) ====== */
const MOTOR = "https://gns-motor.monzon2603.workers.dev";

/* ====== estado ====== */
const ICONOS=['рЯТІ','вЪЧпЄП','рЯПЈпЄП','рЯЪЪ','рЯІ™','рЯІє','рЯУ¶','рЯФђ','рЯІі','рЯЫҐпЄП','рЯУЛ','рЯФІ','рЯ•љ','вЩ®пЄП','рЯІѓ','вЪЦпЄП'];
// videoKey = nombre del archivo del video en Backblaze (o null si no hay)
let estaciones=[
  {id:1,ic:'рЯТІ',nm:'Llenado de agua',videoKey:null,
   pasos:['Verifica que el tambo est√© limpio y sin residuos.','Abre la v√°lvula y llena hasta la marca de nivel.','Cierra y revisa que no haya fugas en la conexi√≥n.','Registra el llenado en la bit√°cora.']},
  {id:2,ic:'рЯПЈпЄП',nm:'Etiquetado',videoKey:null,
   pasos:['Confirma que la etiqueta corresponde al producto y lote.','Limpia y seca la superficie antes de pegar.','Pega centrada, sin burbujas ni arrugas.','Verifica que fecha y lote sean legibles.']},
  {id:3,ic:'вЪЧпЄП',nm:'Formulaci√≥n de producto',videoKey:null,
   pasos:['Ponte el equipo de protecci√≥n (guantes, lentes).','Pesa cada componente seg√Їn la f√≥rmula GNS.','Agrega en el orden indicado, mezclando lento.','Toma muestra para control de calidad.']},
];
let nextId=4;
let editando=null; // estacion en edici√≥n
let pasosTmp=[];    // pasos mientras se edita
let modo='edit';    // 'edit' | 'ver'

function setModo(m){modo=m;
  document.getElementById('tab-edit').classList.toggle('on',m==='edit');
  document.getElementById('tab-ver').classList.toggle('on',m==='ver');
  document.getElementById('addBtn').style.display=m==='edit'?'flex':'none';
  renderLista();}

function renderLista(){
  document.getElementById('lista').innerHTML=estaciones.map(e=>`
    <div class="est-card" onclick="abrir(${e.id})">
      <div class="est-ic">${e.ic}</div>
      <div class="est-main">
        <div class="nm">${e.nm}</div>
        <div class="est-tags">
          <span class="tag ${e.videoKey?'tag-ok':'tag-no'}">${e.videoKey?'вЦґ con video':'sin video'}</span>
          <span class="tag ${e.pasos&&e.pasos.length?'tag-ok':'tag-no'}">${e.pasos&&e.pasos.length?e.pasos.length+' pasos':'sin pasos'}</span>
        </div>
      </div>
      <div class="chev">вАЇ</div>
    </div>`).join('');
  if(!estaciones.length)
    document.getElementById('lista').innerHTML='<p style="color:var(--gris);font-size:13px;text-align:center;padding:20px">A√Їn no hay estaciones. Agrega la primera.</p>';
}

function abrir(id){editando=estaciones.find(e=>e.id===id);
  pasosTmp=[...(editando.pasos||[])];
  modo==='edit'?renderEditor():renderLectura();
  show('detalle');}

function nuevaEstacion(){
  editando={id:nextId++,ic:ICONOS[Math.floor(Math.random()*ICONOS.length)],nm:'',videoKey:null,pasos:[]};
  pasosTmp=[]; renderEditor(); show('detalle');
}

/* ---------- EDITOR ---------- */
function renderEditor(){
  const e=editando;
  const yaExiste=estaciones.some(x=>x.id===e.id);
  document.getElementById('detalle-body').innerHTML=`
    <h2 class="sec">${yaExiste?'Editar estaci√≥n':'Nueva estaci√≥n'}</h2>

    <div class="field">
      <label>Nombre de la estaci√≥n</label>
      <input class="inp" id="f-nm" placeholder="Ej. Carga de rutas" value="${e.nm.replace(/"/g,'&quot;')}">
    </div>

    <div class="field">
      <label>√Нcono</label>
      <div class="ic-picker" id="f-ic">
        ${ICONOS.map(i=>`<button class="ic-opt ${i===e.ic?'sel':''}" onclick="pickIc('${i}')">${i}</button>`).join('')}
      </div>
    </div>

    <div class="field">
      <label>Video de c√≥mo se hace</label>
      <div id="video-slot"></div>
      <div class="hint">Graba a Julio explicando la estaci√≥n con el celular. Formato vertical u horizontal, 2вАУ5 min. El video se guarda en tu almacenamiento privado (Backblaze) al tocar subir.</div>
    </div>

    <div class="field">
      <label>Paso a paso</label>
      <div id="pasos-slot"></div>
      <div class="row-btn">
        <input class="inp" id="f-paso" placeholder="Escribe un paso y agr√©galo" style="flex:1"
          onkeydown="if(event.key==='Enter'){addPaso();event.preventDefault()}">
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="addPaso()">пЉЛ Agregar paso</button>
    </div>

    <button class="btn" onclick="guardarEstacion()">Guardar estaci√≥n</button>
    ${yaExiste?'<button class="btn btn-danger" style="margin-top:8px" onclick="borrarEstacion()">Eliminar estaci√≥n</button>':''}
  `;
  renderVideoSlot(); renderPasosSlot();
}
function pickIc(i){editando.ic=i;
  document.querySelectorAll('#f-ic .ic-opt').forEach(b=>b.classList.toggle('sel',b.textContent===i));}

let subiendo=false;
function renderVideoSlot(){
  const slot=document.getElementById('video-slot');
  if(subiendo){
    slot.innerHTML=`<div class="video-empty">
      <div class="big">вП≥</div><div class="t">Subiendo video...</div>
      <div class="d" id="subeprog">Enviando a tu almacenamiento privado</div></div>`;
    return;
  }
  if(editando.videoKey){
    slot.innerHTML=`<div class="video-zone" id="vplayer">
        <div class="video-empty" style="border:0"><div class="big">вЦґ</div>
        <div class="t">Video guardado</div>
        <button class="btn btn-ghost btn-sm" style="width:auto;margin-top:10px" onclick="verVideoEditor()">Reproducir</button></div>
      </div>
      <div class="vid-actions">
        <button class="btn btn-ghost btn-sm" onclick="pickVideo()">Cambiar video</button>
        <button class="btn btn-danger btn-sm" onclick="quitarVideo()">Quitar</button>
      </div>`;
  }else{
    slot.innerHTML=`<div class="video-empty" onclick="pickVideo()">
      <div class="big">рЯОђ</div><div class="t">Subir o grabar video</div>
      <div class="d">Toca aqu√≠ para elegir del carrete o grabar</div></div>`;
  }
}
// reproduce en el editor pidiendo link temporal al motor
async function verVideoEditor(){
  const cont=document.getElementById('vplayer');
  cont.innerHTML='<div class="video-empty" style="border:0"><div class="big">вП≥</div><div class="t">Cargando...</div></div>';
  const url=await pedirUrlVideo(editando.videoKey);
  if(url) cont.innerHTML=`<video src="${url}" controls playsinline autoplay></video>`;
  else { cont.innerHTML='<div class="video-empty" style="border:0"><div class="t">No se pudo cargar</div></div>'; toast('No se pudo cargar el video'); }
}
function pickVideo(){const fi=document.getElementById('fileInput');
  fi.onchange=async()=>{const f=fi.files[0];if(!f)return; fi.value='';
    await subirVideo(f);
  };
  fi.click();}

// sube el archivo DIRECTO a Backblaze usando un pase del motor (sin tope de 100MB)
async function subirVideo(file){
  const ext=(file.name.split('.').pop()||'mp4').toLowerCase();
  const key=`estacion-${editando.id}-${Date.now()}.${ext}`;
  const tipo=file.type||'video/mp4';
  subiendo=true; renderVideoSlot();
  try{
    // 1) pedir el pase de subida al motor
    const rp=await fetch(`${MOTOR}/subir-pase?nombre=${encodeURIComponent(key)}&tipo=${encodeURIComponent(tipo)}`);
    const dp=await rp.json();
    if(!dp.ok){ toast('Error al pedir pase: '+(dp.error||'?')); subiendo=false; renderVideoSlot(); return; }
    // 2) subir el video DIRECTO a Backblaze con el pase (PUT)
    const up=await fetch(dp.url,{ method:'PUT', headers:{'content-type':tipo}, body:file });
    if(up.ok){
      editando.videoKey=dp.key;
      toast('Video guardado en tu almacenamiento');
    }else{
      toast('Backblaze rechaz√≥ la subida ('+up.status+')');
    }
  }catch(e){
    toast('No se pudo subir el video');
  }
  subiendo=false; renderVideoSlot();
}

// pide al motor un link temporal seguro para reproducir
async function pedirUrlVideo(key){
  try{
    const r=await fetch(`${MOTOR}/video?key=${encodeURIComponent(key)}`);
    const d=await r.json();
    return d.ok?d.url:null;
  }catch(e){return null;}
}

function quitarVideo(){editando.videoKey=null;renderVideoSlot();}

function renderPasosSlot(){
  const slot=document.getElementById('pasos-slot');
  if(!pasosTmp.length){slot.innerHTML='<p style="font-size:12px;color:var(--gris);padding:4px 0">A√Їn no hay pasos.</p>';return;}
  slot.innerHTML=pasosTmp.map((p,i)=>`<div class="paso">
    <div class="paso-n">${i+1}</div>
    <div class="paso-t">${p.replace(/</g,'&lt;')}</div>
    <button class="btn-ghost" style="border:0;color:var(--alerta);font-weight:800;font-size:18px;background:none;cursor:pointer;padding:0 6px" onclick="delPaso(${i})">√Ч</button>
  </div>`).join('');
}
function addPaso(){const inp=document.getElementById('f-paso');const v=inp.value.trim();
  if(!v)return;pasosTmp.push(v);inp.value='';renderPasosSlot();inp.focus();}
function delPaso(i){pasosTmp.splice(i,1);renderPasosSlot();}

function guardarEstacion(){
  const nm=document.getElementById('f-nm').value.trim();
  if(!nm){toast('Ponle nombre a la estaci√≥n');return;}
  editando.nm=nm;editando.pasos=[...pasosTmp];
  if(!estaciones.some(x=>x.id===editando.id))estaciones.push(editando);
  else estaciones=estaciones.map(x=>x.id===editando.id?editando:x);
  toast('Estaci√≥n guardada');show('lista');
}
function borrarEstacion(){
  estaciones=estaciones.filter(x=>x.id!==editando.id);
  toast('Estaci√≥n eliminada');show('lista');
}

/* ---------- LECTURA (como operador) ---------- */
function renderLectura(){
  const e=editando;
  const vid=e.videoKey
    ?`<div class="video-zone" id="vplayer-lec">
        <div class="video-empty" style="border:0"><div class="big">вЦґ</div>
        <div class="t">Toca para ver el video</div>
        <button class="btn btn-ghost btn-sm" style="width:auto;margin-top:10px" onclick="verVideoLectura('${e.videoKey}')">Reproducir</button></div>
      </div>`
    :`<div class="video-empty"><div class="big">рЯОђ</div><div class="t">Sin video todav√≠a</div>
       <div class="d">Julio a√Їn no graba esta estaci√≥n</div></div>`;
  const pasos=e.pasos&&e.pasos.length
    ?e.pasos.map((p,i)=>`<div class="paso"><div class="paso-n">${i+1}</div><div class="paso-t">${p.replace(/</g,'&lt;')}</div></div>`).join('')
    :'<p style="font-size:13px;color:var(--gris);padding:8px 0">Sin pasos registrados.</p>';
  document.getElementById('detalle-body').innerHTML=`
    <div class="read-banner"><span class="em">${e.ic}</span>
      <div><b>${e.nm}</b><br><span style="color:rgba(242,239,230,.65);font-size:12px">M√≠ralo, l√©elo y luego pract√≠calo con quien ya domina la estaci√≥n.</span></div>
    </div>
    <h2 class="sec">Video</h2>${vid}
    <h2 class="sec" style="margin-top:20px">Paso a paso</h2>
    <div style="background:#fff;border:1px solid var(--linea);border-radius:14px;padding:14px">${pasos}</div>
  `;
}
async function verVideoLectura(key){
  const cont=document.getElementById('vplayer-lec');
  cont.innerHTML='<div class="video-empty" style="border:0"><div class="big">вП≥</div><div class="t">Cargando...</div></div>';
  const url=await pedirUrlVideo(key);
  if(url) cont.innerHTML=`<video src="${url}" controls playsinline autoplay></video>`;
  else { cont.innerHTML='<div class="video-empty" style="border:0"><div class="t">No se pudo cargar el video</div></div>'; }
}

/* ---------- nav ---------- */
function show(v){document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  if(v==='lista')renderLista();window.scrollTo(0,0);}
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;
  el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2000);}

renderLista();
</script>
</body>
</html>
